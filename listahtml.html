<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Doblemente Enlazada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="row">
        <div class="col-md-8">
            <label>Ingresar numero</label>
            <input type="number" class="form-control" id="numero" placeholder="Ingresar un numero">
        </div>
    </div>

    <br>

    <p id="datos"></p>
    <br>

    <div class="row">
        <div class="col-md-2">
            <button class="btn btn-danger btn-block" onclick="lista.ingresarAlInicio(parseInt(numero.value))">Agregar al
                inicio</button>
        </div>

        <div class="col-md-2">
            <button class="btn btn-danger btn-block" onclick="lista.ingresarAlFinal(parseInt(numero.value))">Agregar al
                final</button>
        </div>

        <div class="col-md-2">
            <button class="btn btn-danger btn-block" onclick="lista.quitarAlInicio()">Quitar al inicio</button>
        </div>

        <div class="col-md-2">
            <button class="btn btn-danger btn-block" onclick="lista.quitarAlFinal()">Quitar al final</button>
        </div>
    </div>

    <br>

    <div class="row">
        <div class="col-md-2">
            <button class="btn btn-success btn-block" onclick="lista.cantidadElementos()">Cantidad</button>
        </div>

        <div class="col-md-2">
            <button class="btn btn-success btn-block" onclick="lista.sumaElementos()">Suma</button>
        </div>
    </div>

    <br>

    <ul id="lista" class="list-group"></ul>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lista.js"></script>
</body>

</html>
