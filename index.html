<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pila Con Nodo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="container">

        <div class="row mb-3">
            <div class="col">
                <h2 style="color:rgb(225, 225, 225);">INGRESAR VALORES POR COLA</h2>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <!--Tarjeta-->
                <div class="card">
                    <div class="card-body">

                        <div class="row  mb-3">
                            <div class="col">
                                <input type="number" class="form-control" id="valor" placeholder="Ingresar el numero">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <input type="number" class="form-control" id="posicion" placeholder="Ingresar posicion">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col">
                                <p id="lista"></p>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col d-flex gap-2 flex-wrap">
                                <button class="btn btn-primary" onclick="lista.ingresarAlInicio(Number(document.getElementById('valor').value))">Ingresar al Inicio</button>
                                <button class="btn btn-primary" onclick="lista.ingresarAlFinal(Number(document.getElementById('valor').value))">Ingresar al Final</button>
                                <button class="btn btn-success" onclick="lista.ingresarEnPosicion(Number(document.getElementById('valor').value), Number(document.getElementById('posicion').value))">Ingresar en Posicion</button>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col d-flex gap-2 flex-wrap">
                                <button class="btn btn-danger" onclick="lista.quitarAlFinal()">Quitar al Final</button>
                                <button class="btn btn-danger" onclick="lista.quitarAlInicio()">Quitar al Inicio</button>
                                <button class="btn btn-warning" onclick="lista.cantidadElementos()">Cantidad de Elemento</button>
                                <button class="btn btn-warning" onclick="lista.Sumatoria()">Sumatoria</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

            <script src="Listas.js"></script>

            <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
                integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
                crossorigin="anonymous"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
                integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
                crossorigin="anonymous"></script>
</body>


</html>
