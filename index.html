<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pila Con Nodo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="container">

        <div class="row mb-3">
            <div class="col">
                <h2 style="color:rgb(225, 225, 225);">INGRESAR VALORES POR COLA</h2>
            </div>
        </div>

        <div class="row mb-3" id="cajascontainer">
            <div class="col">
                <div class="card">
                    <div class="card-body">



                        <!--tabla-->
                        <table class="table">
                            <thead>
                                <tr>
                                    <th scope="col">#</th>
                                    <th scope="col">Nombre Completo</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th scope="row">1</th>
                                    <td>ALEJANDRO RAMIREZ</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <!--tabla-->
                        <table class="table">
                            <thead>
                                <tr>
                                    <th scope="col">#</th>
                                    <th scope="col">Nombre Completo</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th scope="row">2</th>
                                    <td>DENIS COBAR</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <!--tabla-->
                        <table class="table">
                            <thead>
                                <tr>
                                    <th scope="col">#</th>
                                    <th scope="col">Nombre Completo</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th scope="row">3</th>
                                    <td>DERECK RODAS</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <!--tabla-->
                        <table class="table">
                            <thead>
                                <tr>
                                    <th scope="col">#</th>
                                    <th scope="col">Nombre Completo</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th scope="row">4</th>
                                    <td>EDUARDO FLORES</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <!--tabla-->
                        <table class="table">
                            <thead>
                                <tr>
                                    <th scope="col">#</th>
                                    <th scope="col">Nombre Completo</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th scope="row">5</th>
                                    <td>VLADIMIR ZUNIGA</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>


        <div class="row mb-3">
            <div class="col">
                <!--Tarjeta-->
                <div class="card">
                    <div class="card-body">

                        <!--tabla-->
                        <table class="table">
                            <thead>
                                <tr>
                                    <th scope="col">#</th>
                                    <th scope="col">Nombre Completo</th>
                                </tr>
                            </thead>
                            <tbody id="lista-tbody">
                                <tr>
                                    <th scope="row">3</th>
                                    <td>DERECK RODAS</td>
                                </tr>
                            </tbody>
                        </table>

                        <p>Numero ID:</p>
                        <div class="row  mb-2">
                            <div class="col">
                                <input type="number" class="form-control" id="valor" placeholder="Ingresar el numero">
                            </div>
                        </div>

                        <P>Nombre:</P>
                        <div class="row  mb-2">
                            <div class="col">
                                <input class="form-control" id="nombre" placeholder="Ingresar el Nombre">
                            </div>
                        </div>

                        <p>Posicion:</p>
                        <div class="row mb-2">
                            <div class="col">
                                <input type="number" class="form-control" id="posicion" placeholder="Ingresar posicion">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col">
                                <p id="mensaje"></p>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col d-flex gap-2 flex-wrap">
                                <button class="btn btn-primary"
                                    onclick="lista.ingresarAlInicio(Number(document.getElementById('valor').value), document.getElementById('nombre').value)">Ingresar
                                    al Inicio</button>
                                <button class="btn btn-primary"
                                    onclick="lista.ingresarAlFinal(Number(document.getElementById('valor').value), document.getElementById('nombre').value)">Ingresar
                                    al Final</button>
                                <button class="btn btn-success"
                                    onclick="lista.ingresarEnPosicion(Number(document.getElementById('valor').value), Number(document.getElementById('nombre').value), document.getElementById('posicion').value)">Ingresar
                                    en Posicion</button>
                                <button class="btn btn-warning" onclick="lista.generarCaja()">Sumatoria</button>

                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col d-flex gap-2 flex-wrap">
                                <button class="btn btn-danger" onclick="lista.quitarAlFinal()">Quitar al Final</button>
                                <button class="btn btn-danger" onclick="lista.quitarAlInicio()">Quitar al
                                    Inicio</button>
                                <button class="btn btn-warning" onclick="lista.cantidadElementos()">Cantidad de
                                    Elemento</button>
                                <button class="btn btn-warning" onclick="lista.Sumatoria()">Sumatoria</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="lista.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>

    <script>
        renderCajas();
    </script>
</body>


</html>
